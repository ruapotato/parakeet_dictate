name: Build Windows EXE

# Builds ParakeetDictate.exe on a real Windows runner (PyInstaller can't
# cross-compile) and makes it downloadable:
#   - every run  -> attached as a workflow "artifact"
#   - push to main -> published to a rolling prerelease tagged "latest"
#   - push a tag like v1.2.0 -> published as a stable, versioned release
on:
  push:
    branches: [main]
    tags: ['v*']
    # Skip rebuilds for docs-only changes. Note: filters also apply to tag
    # pushes, so tag a commit that includes code (or use "Run workflow" /
    # workflow_dispatch) to force a build regardless of what changed.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write        # needed to create/update releases

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash      # so '||' and line continuations behave consistently
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Sanity-check pure-Python logic
        run: |
          python test_formatting.py
          python test_vad.py

      - name: Build single-file exe
        run: |
          pyinstaller --onefile --windowed --name ParakeetDictate \
            --icon parakeet.ico \
            --collect-all onnxruntime \
            --collect-all pywinusb \
            --collect-all onnx_asr \
            --collect-submodules sounddevice \
            --hidden-import vad \
            parakeet_dictate.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParakeetDictate-exe
          path: dist/ParakeetDictate.exe
          retention-days: 30

      - name: Publish rolling "latest" build (main branch)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || echo "no existing 'latest' release"
          gh release create latest dist/ParakeetDictate.exe \
            --prerelease \
            --title "Latest build" \
            --notes "Automated build from commit ${{ github.sha }}.
          Unsigned test build — Windows SmartScreen may warn on first launch.
          First run downloads the ~640 MB speech model once, then runs offline."

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/ParakeetDictate.exe \
            --title "${GITHUB_REF_NAME}" \
            --notes "Parakeet Dictate ${GITHUB_REF_NAME}. Fully local, HIPAA-friendly voice-to-text.
          First run downloads the ~640 MB speech model once, then runs offline."
